# Ultralytics YOLO 🚀, AGPL-3.0 license
# YOLOv8-seg instance segmentation model. For Usage examples see https://docs.ultralytics.com/tasks/segment

# Parameters
nc: 1  # number of classes
scales: # model compound scaling constants, i.e. 'model=yolov8n-seg.yaml' will call yolov8-seg.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.50, 1024]
  m: [0.67, 0.75, 768]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.25, 512]

# YOLOv8.0n backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Focus, [64, 3]]  # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]]  # 1-P2/4
  - [-1, 3, C2f_ParallelPolarized, [128, True]]
  - [-1, 1, Conv, [256, 3, 2]]  # 3-P3/8
  - [-1, 6, C2f_ParallelPolarized, [256, True]]
  - [-1, 1, Conv, [512, 3, 2]]  # 5-P4/16
  - [-1, 6, C2f_ParallelPolarized, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]]  # 7-P5/32
  - [-1, 3, C2f_ParallelPolarized, [1024, True]]
  - [-1, 1, ASPPF, [1024, 5]] # 9


  - [-4, 1, Focus, [64, 3]]  # 10-P1/2
  - [-1, 1, Conv, [ 128, 3, 2]]  # 11-P2/4
  - [-1, 3, C2f_ParallelPolarized, [ 128, True]]
  - [-1, 1, Conv, [ 256, 3, 2]]  # 13-P3/8
  - [-1, 6, C2f_ParallelPolarized, [ 256, True]]
  - [-1, 1, Conv, [ 512, 3, 2]]  # 15-P4/16
  - [-1, 6, C2f_ParallelPolarized, [ 512, True]]
  - [-1, 1, Conv, [ 1024, 3, 2]]  # 17-P5/32
  - [-1, 3, C2f_ParallelPolarized, [ 1024, True]]
  - [-1, 1, ASPPF, [ 1024, 5]]   # 19

  # add
  - [[4,14], 1, iAFF, [1]] #21
  - [[6,16], 1, iAFF, [1]] #22
  - [[9,19], 1, iAFF, [1]] #23

# YOLOv8.0n head
head:
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] #
  - [[-1, 22], 1, Concat, [1]]  # cat backbone P4
  - [-1, 3, C2f, [512]]  # 26

  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] #
  - [[-1, 21], 1, Concat, [1]]  # cat backbone P3
  - [-1, 3, C2f, [256]]  # 29 (P3/8-small)

  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] #26
  - [[-1, 20], 1, Concat, [1]]  # cat backbone P3
  - [-1, 3, C2f, [128]]  # 32 (P3/8-small)

  - [-1, 1, Conv, [128, 3, 2]] #29
  - [[-1, 29], 1, Concat, [1]]  # cat head P4
  - [-1, 3, C2f, [256]]  # 35 (P4/16-medium)

  - [-1, 1, Conv, [256, 3, 2]] #29
  - [[-1, 26], 1, Concat, [1]]  # cat head P4
  - [-1, 3, C2f, [512]]  # 38 (P4/16-medium)

  - [-1, 1, Conv, [512, 3, 2]] #32
  - [[-1, 23], 1, Concat, [1]]  # cat head P5
  - [-1, 3, C2f, [1024]]  # 41 (P5/32-large)

  - [[35, 38, 41], 1, Segment, [nc, 32, 256]]  # Segment(P3, P4, P5)